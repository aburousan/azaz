<body class="layout--single">
<script>
  (function() {
    const path = window.location.pathname.toLowerCase();
    const body = document.body;
    let iconClass = 'fa-laptop-code';
    
    if (path.includes('qft') || path.includes('form_pedestrian')) {
      body.classList.add('theme-qft');
      iconClass = 'fa-radiation';
    } else if (path.includes('astronom') || path.includes('dawn')) {
      body.classList.add('theme-astro');
      iconClass = 'fa-meteor';
    } else if (path.includes('physics')) {
      body.classList.add('theme-physics');
      iconClass = 'fa-atom';
    } else if (path.includes('maths') || path.includes('mandel') || path.includes('legendre')) {
      body.classList.add('theme-maths');
      iconClass = 'fa-square-root-alt';
    } else {
      body.classList.add('theme-default');
    }
    
    // Inject the watermark element directly so FontAwesome JS can convert it to SVG
    const watermark = document.createElement('i');
    watermark.className = 'fas ' + iconClass + ' watermark-bg';
    body.appendChild(watermark);
  })();
</script>
