<script>
  (function(){
  
    // Get the elements.
    // - the 'pre' element.
    // - the 'div' with the 'paste-content' id.
  
    var pre = document.getElementsByTagName('pre');
  
    // Add a copy button in the 'pre' element.
    // which only has the className of 'language-' or ' hljs'(if enable highlight.js pre-render).
  
    for (var i = 0; i < pre.length; i++) {
      var tag_name = pre[i].children[0].className
                var isLanguage = tag_name.startsWith('language-') || tag_name.endsWith(' hljs');
      if ( isLanguage ) {
        var button           = document.createElement('button');
            button.className = 'copy-button';
            button.textContent = 'Copy';
  
            pre[i].appendChild(button);
      }
    };
  
    // Run Clipboard
  
    var copyCode = new Clipboard('.copy-button', {
      target: function(trigger) {
        return trigger.previousElementSibling;
      }
    });
  
    // On success:
    // - Change the "Copy" text to "Copied".
    // - Swap it to "Copy" in 2s.
    // - Lead user to the "contenteditable" area with Velocity scroll.
  
    copyCode.on('success', function(event) {
      event.clearSelection();
      event.trigger.textContent = 'Copied';
      window.setTimeout(function() {
        event.trigger.textContent = 'Copy';
      }, 2000);
  
    });
  
    // On error (Safari):
    // - Change the  "Press Ctrl+C to copy"
    // - Swap it to "Copy" in 2s.
  
    copyCode.on('error', function(event) {
      event.trigger.textContent = 'Press "Ctrl + C" to copy';
      window.setTimeout(function() {
        event.trigger.textContent = 'Copy';
      }, 5000);
    });
  
  // TOC Collapser
  var tocs = document.querySelectorAll('.franklin-toc');
  for (var i = 0; i < tocs.length; i++) {
    var toc = tocs[i];
    var details = document.createElement('details');
    var summary = document.createElement('summary');
    
    // Style the summary
    summary.innerHTML = '<i class="fas fa-list-ul"></i> Table of Contents';
    summary.style.cursor = 'pointer';
    summary.style.fontWeight = 'bold';
    summary.style.marginBottom = '1rem';
    summary.style.fontSize = '1.2em';
    summary.style.outline = 'none';
    summary.style.color = '#e52e71'; // Accent color
    
    // Move TOC contents into details
    var children = Array.prototype.slice.call(toc.childNodes);
    for (var j = 0; j < children.length; j++) {
      details.appendChild(children[j]);
    }
    
    // Put summary into details, and details into toc
    details.insertBefore(summary, details.firstChild);
    toc.appendChild(details);
  }

  })();
  </script>
